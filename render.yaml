services:
  # Backend - Node.js Web Service
  - type: web
    name: leavemanage-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false        # Set this manually in Render dashboard
      - key: GROQ_API_KEY
        sync: false        # Set this manually in Render dashboard
      - key: CLIENT_URL
        sync: false        # Set to your frontend Render URL after first deploy

  # Frontend - Static Site
  - type: web
    name: leavemanage-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false        # Set to your backend Render URL after first deploy
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
